<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>The Learning Loop</title>
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <!-- Font Awesome icons (free version)-->
        <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
        <!-- Google fonts-->
        <link href="https://fonts.googleapis.com/css?family=Catamaran:100,200,300,400,500,600,700,800,900" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css?family=Lato:100,100i,300,300i,400,400i,700,700i,900,900i" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="css/styles.css" rel="stylesheet" />

        <script>

            document.addEventListener("DOMContentLoaded", function () {

                const smilesInput =
                    document.getElementById("smiles");

                const analyzeBtn =
                    document.getElementById("analyzeBtn");

                smilesInput.addEventListener("input", function () {

                    const value =
                        this.value.trim();

                    analyzeBtn.disabled =
                        value.length === 0;

                });

            });

            </script>

    </head>
    <body id="page-top">
        <!-- Navigation-->
        <nav class="navbar navbar-expand-lg text-dark navbar-custom">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center" href="#">
                    <img src="https://frontend-production-theta.vercel.app/LISicon.jpg"
                        alt="Logo"
                        width="40"
                        height="40"
                        class="me-2">
                    <span>Living in silico</span>
                </a>
                

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
                <div class="collapse navbar-collapse" id="navbarResponsive">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="https://livinginsilico.ca">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="https://livinginsilico.ca/blog-2/">Blog</a></li>
                        <li class="nav-item"><a class="nav-link" href="https://livinginsilico.ca/about-2/">About</a></li>
                        <li class="nav-item"><a class="nav-link" href="https://livinginsilico.ca/sponsors/">Sponsors</a></li>
                        <li class="nav-item"><a class="nav-link" href="https://livinginsilico.ca/newsletter-sign-up-form/">Newsletter</a></li>
                        <li class="nav-item"><a class="nav-link" href="https://livinginsilico.ca/contact/">Contact</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <section>
            <div class="container py-5">

                
                <div class="main-card">

                    <ul class="nav nav-pills justify-content-center history-nav">
                        <li class="nav-item">

                            <button
                                id="analyzeTab"
                                class="nav-link active"
                                onclick="showAnalyze()">
                                Analyze
                            </button>

                        </li>
                        
                        <li class="nav-item">

                            <button
                                id="historyTab"
                                class="nav-link"
                                onclick="loadHistory()">

                                History

                            </button>

                        </li>

                        <li class="nav-item">

                            <button
                                id="dashboardTab"
                                    class="nav-link"
                                    onclick="loadDashboard()">

                                    Analytics

                                </button>

                        </li>
                    </ul>

                    <div id="analyzeSection">
                            
                            <div class="text-center">

                                <h1 class="main-title">
                                    GNN for Klebsiella Drug Discovery
                                </h1>

                                <p class="subtitle">
                                    AI-powered prediction of potential SSB-PriA inhibitors
                                </p>

                            </div>

                            <!-- SMILES -->

                            <div class="mt-4">

                                <input
                                    type="text"
                                    id="smiles"
                                    class="form-control smiles-input"
                                    placeholder="Enter a SMILES string (e.g., CC1=CC=C...)">

                            </div>

                            <!-- BUTTONS -->
                            <div class="row mt-4">

                                <div class="col-md-8">

                                    <button
                                        id="analyzeBtn"
                                        class="btn analyze-btn w-100 mb-3"
                                        onclick="predict()"
                                        disabled>

                                        Analyze Compound

                                    </button>

                                </div>

                                <div class="col-md-4">

                                    <button
                                        class="btn reset-btn w-100"
                                        onclick="
                                        document.getElementById('smiles').value='';
                                        document.getElementById('result').innerHTML='';
                                        document.getElementById('moleculeImage').style.display='none';
                                        document.querySelector('.result-section').style.display = 'none';
                                        ">

                                        Reset Input

                                    </button>

                                </div>

                            </div>

                            <!-- RESULT -->
                            <div class="result-section flex-wrap">
                                <div id="result"></div>

                                <!-- MOLECULE IMAGE -->

                                <div class="text-center result-image">

                                    <img
                                        id="moleculeImage"
                                        src=""
                                        class="img-fluid molecule-preview"
                                        style="display:none;">

                                </div>
                            </div>

                            <!-- BATCH -->
                            <h3 class="text-center mt-5 mb-4">

                                Bulk Compound Prediction

                            </h3>

                            <div class="upload-section">

                                <div class="btn-group shadow-sm" role="group">

                                    <label for="csvFile" class="btn btn-light border">
                                        <i class="bi bi-upload"></i> Upload SMILES Dataset (.csv)
                                    </label>

                                    <button
                                        type="button"
                                        class="btn btn-danger"
                                        onclick="uploadCsv()">
                                        <i class="fa fa-check"></i>
                                    </button>

                                </div>

                                <input
                                    type="file"
                                    id="csvFile"
                                    accept=".csv"
                                    hidden>

                            </div>

                            <!-- TABLE -->

                            <div
                        id="batchResultsSection"
                        class="results-section mt-5"
                        style="display:none;">

                                <div class="d-flex justify-content-between align-items-center mb-3">

                                    <h4>
                                        Prediction Result
                                    </h4>

                                    <button
                                        class="btn btn-dark"
                                        id="downloadCsvBtn"
                                        onclick="downloadResultsCsv()"
                                        style="display:none;">

                                        Download CSV

                                    </button>

                                </div>

                                <div class="table-responsive">

                                    <table
                                        class="table table-hover">

                                        <thead class="table-secondary">

                                            <tr>
                                                <th>SMILES</th>
                                                <th>PREDICTIONS</th>
                                                <th>CONFIDENCE</th>
                                            </tr>

                                        </thead>

                                        <tbody id="csvResults">

                                        </tbody>

                                    </table>

                                </div>

                            </div>
                            
                    </div>

                    
                    <!-- Additional Tools -->

                    <div class="container mt-2 mb-5">
                        <div id="dynamicContent"></div>
                    </div>

                </div>

            </div>
        </section>
        





        




        <!-- Footer-->
        <footer class="py-5 bg-black">
            <div class="container px-5"><p class="m-0 text-center text-white small">Copyright &copy; The Learning Loop</p></div>
        </footer>
        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Core theme JS-->
        <script src="js/prediction.js"></script>
        <script src="js/csv-upload.js"></script>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="js/history.js"></script>
        <script src="js/admin.js"></script>
        <script src="js/navigation.js"></script>

    </body>
</html>
